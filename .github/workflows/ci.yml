name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  native-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - run: chmod +x tests/integration.sh && ./tests/integration.sh ./target/release/unit
      - uses: actions/upload-artifact@v4
        with:
          name: unit-native
          path: target/release/unit

  wasm-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - run: cargo build --release --target wasm32-unknown-unknown
      - run: cp target/wasm32-unknown-unknown/release/unit.wasm web/unit.wasm
      - uses: actions/upload-artifact@v4
        with:
          name: web
          path: web/

  deploy-pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: wasm-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: web
          path: web/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/
      - id: deployment
        uses: actions/deploy-pages@v4
