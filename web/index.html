<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>unit — a software nanobot</title>
<meta name="description" content="A self-replicating Forth interpreter that runs in your browser. 226KB. Zero dependencies.">
<meta property="og:title" content="unit — a software nanobot">
<meta property="og:description" content="A self-replicating Forth mesh agent running as 226KB of WebAssembly. Type Forth commands in your browser.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://davidcanhelp.github.io/unit/">
<meta name="twitter:card" content="summary">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230a0a0a' width='100' height='100' rx='12'/><text x='50' y='72' font-size='64' font-family='monospace' fill='%2300ff88' text-anchor='middle'>u</text></svg>">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a; color: #00ff88; font-family: 'Courier New', monospace;
    font-size: 14px; height: 100vh; display: flex; flex-direction: column;
  }
  a { color: #00ff88; text-decoration: none; }
  a:hover { text-decoration: underline; }
  #info {
    padding: 10px 14px 8px; border-bottom: 1px solid #1a1a1a;
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 6px;
  }
  #info-left { display: flex; align-items: center; gap: 12px; }
  #info-left .title { color: #00ff88; font-weight: bold; }
  #info-left .desc { color: #555; font-size: 12px; }
  #info-right { display: flex; gap: 10px; font-size: 11px; color: #444; }
  #info-right .badge {
    background: #111; border: 1px solid #222; padding: 2px 6px;
    border-radius: 3px; color: #00ff88; font-size: 11px;
  }
  #mesh-bar {
    padding: 4px 14px; border-bottom: 1px solid #111;
    display: flex; gap: 8px; align-items: center; font-size: 11px;
  }
  #mesh-bar .dot {
    width: 6px; height: 6px; border-radius: 50%;
    display: inline-block; margin-right: 2px;
  }
  .dot-off { background: #600; }
  .dot-on { background: #0a0; }
  #ws-url {
    background: #111; border: 1px solid #222; color: #888;
    font-family: inherit; font-size: 11px; padding: 1px 6px;
    border-radius: 2px; width: 220px; outline: none;
  }
  #ws-url:focus { border-color: #444; color: #00ff88; }
  #ws-btn {
    background: #111; border: 1px solid #222; color: #555;
    font-family: inherit; font-size: 11px; padding: 1px 8px;
    border-radius: 2px; cursor: pointer;
  }
  #ws-btn:hover { color: #00ff88; border-color: #444; }
  #mesh-status { color: #555; }
  #terminal {
    flex: 1; overflow-y: auto; padding: 12px; white-space: pre-wrap;
    word-wrap: break-word; font-size: 13px; line-height: 1.4;
  }
  #hints {
    padding: 4px 14px 6px; border-top: 1px solid #111;
    font-size: 11px; color: #333; display: flex; gap: 8px;
    flex-wrap: wrap; align-items: center;
  }
  #hints span { color: #444; }
  .hint {
    color: #2a6; cursor: pointer; background: #0d0d0d;
    padding: 1px 5px; border-radius: 2px; border: 1px solid #1a1a1a;
  }
  .hint:hover { color: #00ff88; border-color: #333; }
  #input-line {
    display: flex; padding: 8px 14px; background: #0d0d0d;
    border-top: 1px solid #222;
  }
  #prompt { color: #00ff88; margin-right: 8px; line-height: 24px; }
  #input {
    flex: 1; background: transparent; border: none; outline: none;
    color: #00ff88; font-family: inherit; font-size: 14px;
    caret-color: #00ff88;
  }
  .output { color: #bbb; }
  .error { color: #ff4444; }
  .info { color: #555; }
  .mesh-event { color: #886; }
</style>
</head>
<body>
<div id="info">
  <div id="info-left">
    <span class="title">unit</span>
    <span class="desc">A self-replicating Forth mesh agent. Type Forth below.</span>
  </div>
  <div id="info-right">
    <span class="badge">226KB WASM</span>
    <a href="https://github.com/DavidCanHelp/unit">GitHub</a>
  </div>
</div>
<div id="mesh-bar">
  <span class="dot dot-off" id="mesh-dot"></span>
  <span id="mesh-status">mesh: offline</span>
  <input id="ws-url" type="text" value="" spellcheck="false" placeholder="ws://localhost:6201">
  <button id="ws-btn" onclick="toggleMesh()">Connect</button>
</div>
<div id="terminal" onclick="document.getElementById('input').focus()"></div>
<div id="hints">
  <span>try:</span>
  <span class="hint" onclick="paste(this)">2 3 + .</span>
  <span class="hint" onclick="paste(this)">: SQUARE DUP * ; 7 SQUARE .</span>
  <span class="hint" onclick="paste(this)">WORDS</span>
  <span class="hint" onclick="paste(this)">10 0 DO I . LOOP</span>
  <span class="hint" onclick="paste(this)">5 3 > IF ." yes" ELSE ." no" THEN</span>
  <span class="hint" onclick="paste(this)">DASHBOARD</span>
</div>
<div id="input-line">
  <span id="prompt">&gt;</span>
  <input id="input" type="text" autofocus autocomplete="off" spellcheck="false">
</div>

<script src="unit.js"></script>
<script>
  const terminal = document.getElementById('terminal');
  const input = document.getElementById('input');
  const meshDot = document.getElementById('mesh-dot');
  const meshStatusEl = document.getElementById('mesh-status');
  const wsUrlInput = document.getElementById('ws-url');
  const wsBtn = document.getElementById('ws-btn');
  let vm = null;
  let mesh = null;
  let history = [];
  let histIdx = -1;

  function appendOutput(text, className) {
    if (!text) return;
    const span = document.createElement('span');
    span.className = className || 'output';
    span.textContent = text;
    terminal.appendChild(span);
    terminal.scrollTop = terminal.scrollHeight;
  }

  function paste(el) {
    input.value = el.textContent;
    input.focus();
  }

  function updateMeshUI(status, detail) {
    if (status === 'connected') {
      meshDot.className = 'dot dot-on';
      const p = mesh ? mesh.peers : 0;
      const b = mesh ? mesh.browsers : 0;
      meshStatusEl.textContent = `mesh: connected (${p} peers, ${b} browsers)`;
      wsBtn.textContent = 'Disconnect';
    } else {
      meshDot.className = 'dot dot-off';
      meshStatusEl.textContent = detail ? `mesh: ${detail}` : 'mesh: offline';
      wsBtn.textContent = 'Connect';
    }
  }

  function toggleMesh() {
    if (mesh && mesh.isConnected()) {
      mesh.disconnect();
      appendOutput('[mesh disconnected]\n', 'mesh-event');
    } else {
      let url = wsUrlInput.value.trim();
      if (!url) {
        // Auto-detect: connect to WS on the same host:port we were loaded from.
        url = 'ws://' + location.host + '/';
        wsUrlInput.value = url;
      }
      if (!mesh) {
        mesh = new MeshClient(
          (msg) => {
            // Handle mesh messages.
            if (msg.type === 'broadcast' && msg.message) {
              appendOutput(`[mesh] ${msg.message}\n`, 'mesh-event');
            }
          },
          (status, detail) => updateMeshUI(status, detail)
        );
      }
      mesh.connect(url);
      appendOutput(`[connecting to ${url}...]\n`, 'mesh-event');
    }
  }

  async function init() {
    try {
      vm = await UnitVM.create('unit.wasm');
      appendOutput('unit v0.8.0 \u2014 WASM seed online\n', 'info');
      appendOutput('Type Forth commands. Connect to a native mesh above.\n\n', 'info');
    } catch (e) {
      appendOutput('Failed to load WASM: ' + e.message + '\n', 'error');
      appendOutput('Build with: make build-wasm\n', 'info');
    }
  }

  input.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowUp') {
      if (histIdx < history.length - 1) { histIdx++; input.value = history[history.length - 1 - histIdx]; }
      e.preventDefault(); return;
    }
    if (e.key === 'ArrowDown') {
      if (histIdx > 0) { histIdx--; input.value = history[history.length - 1 - histIdx]; }
      else { histIdx = -1; input.value = ''; }
      e.preventDefault(); return;
    }
    if (e.key !== 'Enter' || !vm) return;
    const line = input.value;
    input.value = '';
    if (line.trim()) { history.push(line); histIdx = -1; }
    appendOutput('> ' + line + '\n', 'info');

    // Check if this is a GOAL{ } submission — forward to mesh if connected.
    if (mesh && mesh.isConnected() && line.includes('GOAL{')) {
      const match = line.match(/(\d+)\s+GOAL\{\s*(.*?)\s*\}/);
      if (match) {
        mesh.submitGoal(match[2], parseInt(match[1]));
        appendOutput(`[submitted to mesh: ${match[2]}]\n`, 'mesh-event');
      }
    }

    const result = vm.eval(line);
    if (result) appendOutput(result);
    appendOutput(' ok\n', 'info');
    if (!vm.isRunning()) {
      appendOutput('\n[unit exited]\n', 'info');
      input.disabled = true;
    }
  });

  init();
</script>
</body>
</html>
