<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>unit — a software nanobot</title>
<meta name="description" content="A self-replicating Forth interpreter that runs in your browser. 226KB. Zero dependencies.">
<meta property="og:title" content="unit — a software nanobot">
<meta property="og:description" content="A self-replicating Forth mesh agent running as 226KB of WebAssembly. Type Forth commands in your browser.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://davidcanhelp.github.io/unit/">
<meta name="twitter:card" content="summary">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230a0a0a' width='100' height='100' rx='12'/><text x='50' y='72' font-size='64' font-family='monospace' fill='%2300ff88' text-anchor='middle'>u</text></svg>">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a; color: #00ff88; font-family: 'Courier New', monospace;
    font-size: 14px; height: 100vh; display: flex; flex-direction: column;
  }
  a { color: #00ff88; text-decoration: none; }
  a:hover { text-decoration: underline; }
  #info {
    padding: 10px 14px 8px; border-bottom: 1px solid #1a1a1a;
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 6px;
  }
  #info-left { display: flex; align-items: center; gap: 12px; }
  #info-left .title { color: #00ff88; font-weight: bold; }
  #info-left .desc { color: #555; font-size: 12px; }
  #info-right { display: flex; gap: 10px; font-size: 11px; color: #444; }
  #info-right .badge {
    background: #111; border: 1px solid #222; padding: 2px 6px;
    border-radius: 3px; color: #00ff88; font-size: 11px;
  }
  #terminal {
    flex: 1; overflow-y: auto; padding: 12px; white-space: pre-wrap;
    word-wrap: break-word; font-size: 13px; line-height: 1.4;
  }
  #hints {
    padding: 4px 14px 6px; border-top: 1px solid #111;
    font-size: 11px; color: #333; display: flex; gap: 8px;
    flex-wrap: wrap; align-items: center;
  }
  #hints span { color: #444; }
  .hint {
    color: #2a6; cursor: pointer; background: #0d0d0d;
    padding: 1px 5px; border-radius: 2px; border: 1px solid #1a1a1a;
  }
  .hint:hover { color: #00ff88; border-color: #333; }
  #input-line {
    display: flex; padding: 8px 14px; background: #0d0d0d;
    border-top: 1px solid #222;
  }
  #prompt { color: #00ff88; margin-right: 8px; line-height: 24px; }
  #input {
    flex: 1; background: transparent; border: none; outline: none;
    color: #00ff88; font-family: inherit; font-size: 14px;
    caret-color: #00ff88;
  }
  .output { color: #bbb; }
  .error { color: #ff4444; }
  .info { color: #555; }
</style>
</head>
<body>
<div id="info">
  <div id="info-left">
    <span class="title">unit</span>
    <span class="desc">A self-replicating Forth mesh agent. Type Forth below.</span>
  </div>
  <div id="info-right">
    <span class="badge">226KB WASM</span>
    <a href="https://github.com/DavidCanHelp/unit">GitHub</a>
  </div>
</div>
<div id="terminal" onclick="document.getElementById('input').focus()"></div>
<div id="hints">
  <span>try:</span>
  <span class="hint" onclick="paste(this)">2 3 + .</span>
  <span class="hint" onclick="paste(this)">: SQUARE DUP * ; 7 SQUARE .</span>
  <span class="hint" onclick="paste(this)">WORDS</span>
  <span class="hint" onclick="paste(this)">10 0 DO I . LOOP</span>
  <span class="hint" onclick="paste(this)">5 3 > IF ." yes" ELSE ." no" THEN</span>
  <span class="hint" onclick="paste(this)">DASHBOARD</span>
</div>
<div id="input-line">
  <span id="prompt">&gt;</span>
  <input id="input" type="text" autofocus autocomplete="off" spellcheck="false">
</div>

<script src="unit.js"></script>
<script>
  const terminal = document.getElementById('terminal');
  const input = document.getElementById('input');
  let vm = null;
  let history = [];
  let histIdx = -1;

  function appendOutput(text, className) {
    if (!text) return;
    const span = document.createElement('span');
    span.className = className || 'output';
    span.textContent = text;
    terminal.appendChild(span);
    terminal.scrollTop = terminal.scrollHeight;
  }

  function paste(el) {
    input.value = el.textContent;
    input.focus();
  }

  async function init() {
    try {
      vm = await UnitVM.create('unit.wasm');
      appendOutput('unit v0.7.1 \u2014 WASM seed online\n', 'info');
      appendOutput('Type Forth commands. Click examples below.\n\n', 'info');
    } catch (e) {
      appendOutput('Failed to load WASM: ' + e.message + '\n', 'error');
      appendOutput('Build with: make build-wasm\n', 'info');
    }
  }

  input.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowUp') {
      if (histIdx < history.length - 1) { histIdx++; input.value = history[history.length - 1 - histIdx]; }
      e.preventDefault(); return;
    }
    if (e.key === 'ArrowDown') {
      if (histIdx > 0) { histIdx--; input.value = history[history.length - 1 - histIdx]; }
      else { histIdx = -1; input.value = ''; }
      e.preventDefault(); return;
    }
    if (e.key !== 'Enter' || !vm) return;
    const line = input.value;
    input.value = '';
    if (line.trim()) { history.push(line); histIdx = -1; }
    appendOutput('> ' + line + '\n', 'info');
    const result = vm.eval(line);
    if (result) appendOutput(result);
    appendOutput(' ok\n', 'info');
    if (!vm.isRunning()) {
      appendOutput('\n[unit exited]\n', 'info');
      input.disabled = true;
    }
  });

  init();
</script>
</body>
</html>
