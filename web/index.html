<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>unit — a software nanobot</title>
<meta name="description" content="A self-replicating Forth interpreter that runs in your browser. 226KB. Zero dependencies.">
<meta property="og:title" content="unit — a software nanobot">
<meta property="og:description" content="A self-replicating Forth mesh agent running as 226KB of WebAssembly. Type Forth commands in your browser.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://davidcanhelp.github.io/unit/">
<meta name="twitter:card" content="summary">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230a0a0a' width='100' height='100' rx='12'/><text x='50' y='72' font-size='64' font-family='monospace' fill='%2300ff88' text-anchor='middle'>u</text></svg>">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a; color: #00ff88; font-family: 'Courier New', monospace;
    font-size: 14px; height: 100vh; display: flex; flex-direction: column;
  }
  a { color: #00ff88; text-decoration: none; }
  a:hover { text-decoration: underline; }
  #info {
    padding: 10px 14px 8px; border-bottom: 1px solid #1a1a1a;
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 6px;
  }
  #info-left { display: flex; align-items: center; gap: 12px; }
  #info-left .title { color: #00ff88; font-weight: bold; }
  #info-left .desc { color: #555; font-size: 12px; }
  #info-right { display: flex; gap: 10px; font-size: 11px; color: #444; }
  #info-right .badge {
    background: #111; border: 1px solid #222; padding: 2px 6px;
    border-radius: 3px; color: #00ff88; font-size: 11px;
  }
  #terminal {
    flex: 1; overflow-y: auto; padding: 12px; white-space: pre-wrap;
    word-wrap: break-word; font-size: 13px; line-height: 1.4;
  }
  #tutorial-bar {
    padding: 6px 14px; border-top: 1px solid #1a2a1a;
    border-left: 3px solid #0a4a0a; background: #0a0f0a;
    font-size: 12px; color: #4a7a4a; display: flex;
    justify-content: space-between; align-items: center;
    min-height: 28px;
  }
  #tutorial-bar .step { color: #2a5a2a; font-size: 10px; }
  #tutorial-bar .cmd {
    color: #00ff88; background: #0d1a0d; padding: 1px 6px;
    border-radius: 2px; cursor: pointer; border: 1px solid #1a3a1a;
  }
  #tutorial-bar .cmd:hover { background: #0a2a0a; }
  #tutorial-bar .skip {
    color: #333; cursor: pointer; font-size: 10px;
    margin-left: 12px;
  }
  #tutorial-bar .skip:hover { color: #666; }
  #tutorial-bar .links a { margin: 0 6px; font-size: 11px; }
  #hints {
    padding: 4px 14px 6px; border-top: 1px solid #111;
    font-size: 11px; color: #333; display: flex; gap: 8px;
    flex-wrap: wrap; align-items: center;
  }
  .hint {
    color: #2a6; cursor: pointer; background: #0d0d0d;
    padding: 1px 5px; border-radius: 2px; border: 1px solid #1a1a1a;
  }
  .hint:hover { color: #00ff88; border-color: #333; }
  #input-line {
    display: flex; padding: 8px 14px; background: #0d0d0d;
    border-top: 1px solid #222;
  }
  #prompt { color: #00ff88; margin-right: 8px; line-height: 24px; }
  #input {
    flex: 1; background: transparent; border: none; outline: none;
    color: #00ff88; font-family: inherit; font-size: 14px;
    caret-color: #00ff88;
  }
  .output { color: #bbb; }
  .error { color: #ff4444; }
  .info { color: #555; }
  .mesh-event { color: #886; }
  .tutorial-msg { color: #3a6a3a; font-style: italic; }
</style>
</head>
<body>
<div id="info">
  <div id="info-left">
    <span class="title">unit</span>
    <span class="desc">A self-replicating Forth mesh agent.</span>
  </div>
  <div id="info-right">
    <span class="badge">226KB WASM</span>
    <a href="https://github.com/DavidCanHelp/unit">GitHub</a>
  </div>
</div>
<div id="terminal" onclick="document.getElementById('input').focus()"></div>
<div id="tutorial-bar"></div>
<div id="hints"></div>
<div id="input-line">
  <span id="prompt">&gt;</span>
  <input id="input" type="text" autofocus autocomplete="off" spellcheck="false">
</div>

<script src="unit.js"></script>
<script>
  const terminal = document.getElementById('terminal');
  const input = document.getElementById('input');
  const tutorialBar = document.getElementById('tutorial-bar');
  const hintsBar = document.getElementById('hints');
  let vm = null;
  let mesh = null;
  let history = [];
  let histIdx = -1;

  // -----------------------------------------------------------------------
  // Tutorial
  // -----------------------------------------------------------------------
  const STEPS = [
    { cmd: '2 3 + .',
      before: 'Welcome to unit. Type the highlighted command to begin \u2192',
      after: 'You just used a stack-based language. 2 and 3 go on the stack, + adds them, . prints the result.' },
    { cmd: ': SQUARE DUP * ;',
      before: 'Now define a word \u2192',
      after: 'You created a new word. SQUARE duplicates the top of the stack and multiplies. The language just grew.' },
    { cmd: '7 SQUARE .',
      before: 'Use it \u2192',
      after: '49. Your word works. In unit, everything is built this way \u2014 from simple pieces.' },
    { cmd: 'SEE SQUARE',
      before: 'See inside it \u2192',
      after: 'The dictionary is transparent. Every word can be inspected, modified, even shared across a network.' },
    { cmd: 'WORDS',
      before: 'List all words \u2192',
      after: '~160 words. Stack ops, arithmetic, mesh networking, self-replication, monitoring \u2014 all from a 226KB binary.' },
    { cmd: '10 0 DO I . LOOP',
      before: 'Try a loop \u2192',
      after: 'Control flow works at the REPL \u2014 no compilation step needed. This is a live, interactive system.' },
    { cmd: 'DASHBOARD',
      before: 'Check the dashboard \u2192',
      after: 'In a native mesh, this shows live watches, alerts, peer status, and sparkline trends. This is an ops tool.' },
    { cmd: '." I am a software nanobot."',
      before: 'One last thing \u2192',
      after: null }, // handled specially
  ];
  let tutorialStep = 0;
  let tutorialActive = true;
  let tutorialComplete = false;

  function renderTutorial() {
    if (!tutorialActive || tutorialComplete) {
      tutorialBar.style.display = 'none';
      renderHints();
      return;
    }
    tutorialBar.style.display = 'flex';
    const step = STEPS[tutorialStep];
    tutorialBar.innerHTML = `
      <div>
        <span class="step">${tutorialStep + 1}/8</span>
        ${step.before}
        <span class="cmd" onclick="pasteCmd('${step.cmd.replace(/'/g, "\\'")}')">${step.cmd}</span>
        <span class="skip" onclick="skipTutorial()">skip tutorial</span>
      </div>`;
    renderHints();
  }

  function renderHints() {
    if (tutorialActive && !tutorialComplete && tutorialStep < STEPS.length) {
      const step = STEPS[tutorialStep];
      hintsBar.innerHTML = `<span class="hint" onclick="pasteCmd('${step.cmd.replace(/'/g, "\\'")}')">${step.cmd}</span>`;
    } else {
      hintsBar.innerHTML = `
        <span style="color:#444">try:</span>
        <span class="hint" onclick="paste(this)">2 3 + .</span>
        <span class="hint" onclick="paste(this)">: SQUARE DUP * ; 7 SQUARE .</span>
        <span class="hint" onclick="paste(this)">WORDS</span>
        <span class="hint" onclick="paste(this)">10 0 DO I . LOOP</span>
        <span class="hint" onclick="paste(this)">DASHBOARD</span>`;
    }
  }

  function advanceTutorial(line) {
    if (!tutorialActive || tutorialComplete) return;
    const step = STEPS[tutorialStep];
    if (line.trim() === step.cmd.trim()) {
      tutorialStep++;
      if (tutorialStep >= STEPS.length) {
        finishTutorial();
      } else {
        // Show the "after" message for the step we just completed.
        appendOutput(step.after + '\n\n', 'tutorial-msg');
        renderTutorial();
      }
    }
  }

  function finishTutorial() {
    tutorialComplete = true;
    tutorialBar.innerHTML = `
      <div>
        Tutorial complete. You're inside a software nanobot.
        <span class="links">
          <a href="https://github.com/DavidCanHelp/unit">GitHub</a>
          <a href="https://crates.io/crates/unit">crates.io</a>
          <a href="#">cargo install unit</a>
        </span>
      </div>`;
    tutorialBar.style.display = 'flex';
    setTimeout(() => { tutorialBar.style.display = 'none'; renderHints(); }, 12000);
    appendOutput("And that's unit. A self-replicating Forth interpreter that is also a networked mesh agent.\ncargo install unit to run it for real.\n\n", 'tutorial-msg');
  }

  function skipTutorial() {
    tutorialActive = false;
    renderTutorial();
  }

  function pasteCmd(cmd) {
    input.value = cmd;
    input.focus();
  }

  // -----------------------------------------------------------------------
  // Core
  // -----------------------------------------------------------------------

  function appendOutput(text, className) {
    if (!text) return;
    const span = document.createElement('span');
    span.className = className || 'output';
    span.textContent = text;
    terminal.appendChild(span);
    terminal.scrollTop = terminal.scrollHeight;
  }

  function paste(el) {
    input.value = el.textContent;
    input.focus();
  }

  async function init() {
    try {
      vm = await UnitVM.create('unit.wasm');
      renderTutorial();
    } catch (e) {
      appendOutput('Failed to load WASM: ' + e.message + '\n', 'error');
      appendOutput('Build with: make build-wasm\n', 'info');
    }
  }

  input.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowUp') {
      if (histIdx < history.length - 1) { histIdx++; input.value = history[history.length - 1 - histIdx]; }
      e.preventDefault(); return;
    }
    if (e.key === 'ArrowDown') {
      if (histIdx > 0) { histIdx--; input.value = history[history.length - 1 - histIdx]; }
      else { histIdx = -1; input.value = ''; }
      e.preventDefault(); return;
    }
    if (e.key !== 'Enter' || !vm) return;
    const line = input.value;
    input.value = '';
    if (line.trim()) { history.push(line); histIdx = -1; }
    appendOutput('> ' + line + '\n', 'info');

    const result = vm.eval(line);
    if (result) appendOutput(result);
    appendOutput(' ok\n', 'info');

    advanceTutorial(line);

    if (!vm.isRunning()) {
      appendOutput('\n[unit exited]\n', 'info');
      input.disabled = true;
    }
  });

  init();
</script>
</body>
</html>
